name: Code Coverage

on:
  pull_request:
    branches: [dev]
  workflow_dispatch:

jobs:
  coverage:
    uses: OpenVoiceOS/gh-automations/.github/workflows/coverage.yml@dev
    with:
      python_version: '3.11'
      coverage_source: 'nuvem_de_som'
      test_path: 'test/'
      install_extras: ''
      min_coverage: 0
